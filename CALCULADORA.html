<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
      font-family: Arial, sans-serif;
    }

    .calculadora {
      background: rgba(15, 23, 42, 0.95);
      padding: 22px;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    #display {
      width: 100%;
      height: 70px;
      font-size: 28px;
      margin-bottom: 16px;
      text-align: right;
      padding: 15px;
      border: none;
      outline: none;
      border-radius: 16px;
      background: #020617;
      color: #f8fafc;
      box-shadow: inset 0 0 8px rgba(255, 255, 255, 0.05);
    }

    .botoes {
      display: grid;
      grid-template-columns: repeat(4, 75px);
      gap: 12px;
    }

    button {
      height: 65px;
      font-size: 20px;
      font-weight: bold;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      background: #1e293b;
      color: #f8fafc;
      transition: 0.2s ease;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
    }

    button:hover {
      transform: translateY(-2px);
      background: #334155;
    }

    button:active {
      transform: scale(0.97);
    }

    .operador {
      background: #f59e0b;
      color: #111827;
    }

    .operador:hover {
      background: #fbbf24;
    }

    .igual {
      background: #2563eb;
      color: white;
    }

    .igual:hover {
      background: #3b82f6;
    }

    .limpar {
      background: #dc2626;
      color: white;
    }

    .limpar:hover {
      background: #ef4444;
    }

    .zero {
      grid-column: span 2;
    }

    .igual-duplo {
      grid-column: span 2;
    }
  </style>
</head>
<body>

<div class="calculadora">
  <input type="text" id="display" disabled>

  <div class="botoes">
    <button onclick="limpar()" class="limpar">C</button>
    <button onclick="apagar()">←</button>
    <button onclick="adicionar('/')" class="operador">/</button>
    <button onclick="adicionar('*')" class="operador">×</button>

    <button onclick="adicionar('7')">7</button>
    <button onclick="adicionar('8')">8</button>
    <button onclick="adicionar('9')">9</button>
    <button onclick="adicionar('-')" class="operador">−</button>

    <button onclick="adicionar('4')">4</button>
    <button onclick="adicionar('5')">5</button>
    <button onclick="adicionar('6')">6</button>
    <button onclick="adicionar('+')" class="operador">+</button>

    <button onclick="adicionar('1')">1</button>
    <button onclick="adicionar('2')">2</button>
    <button onclick="adicionar('3')">3</button>
    <button onclick="adicionar('.')">.</button>

    <button onclick="adicionar('0')" class="zero">0</button>
    <button onclick="calcular()" class="igual igual-duplo">=</button>
  </div>
</div>

<script>
  function adicionar(valor) {
    document.getElementById("display").value += valor;
  }

  function limpar() {
    document.getElementById("display").value = "";
  }

  function calcular() {
    try {
      let resultado = eval(document.getElementById("display").value);
      document.getElementById("display").value = resultado;
    } catch {
      document.getElementById("display").value = "Erro";
    }
  }

  function apagar() {
    let display = document.getElementById("display").value;
    document.getElementById("display").value = display.slice(0, -1);
  }
</script>

</body>
</html>
